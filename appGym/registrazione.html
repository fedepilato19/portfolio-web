<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h1>Registrati</h1>
            <form id="registerForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Registrati</button>
            </form>
            <p>Hai già un account? <a href="login.html">Accedi qui</a></p>
        </div>
        <div id="loginMessage"></div>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            })
            .then(response => response.json())
            .then(data => {
                const loginMessage = document.getElementById("loginMessage");
                if (data.success) {
                    loginMessage.innerHTML = 'Registrazione effettuata con successo! Attendi l^approvazione dell^amministratore...';
                    loginMessage.style.color = 'black';
                    window.location.href = "login.html"; // Torna alla pagina di login dopo la registrazione
                }
            })
            .catch(error => console.error('Errore:', error));
        });
    </script>
</body>
</html>
