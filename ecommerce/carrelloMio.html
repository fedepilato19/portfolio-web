<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrello</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            padding: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        th {
            color: black;
            background-color: rgb(147, 197, 191);
        }

    
        button {
            color: white;
            background-color: rgb(38, 144, 131);
            font-size: 16px;
            height: 1cm;
            width: 5cm;
            border: 1px solid black;
        }

        button:hover {
            background-color: rgb(176, 50, 75);
        }

        #titolo {
            text-align: center;
            color: rgb(51, 124, 116);
            font-size: 40px;
            text-shadow: 1px 1px 1px black;
        }
        #button-delete{

            width: 50px;
           
        }
        .button-quantita{
            width: 40px;
            height: 30px;
            font-size: 14px;

        }
      
    </style>
</head>
<body>
    <button onclick="tornaIndietro()">Torna allo shopping</button>
    <h1 id="titolo">Carrello</h1>
    <table>
        <thead>
            <tr>
                <th>id</th>
                <th>nome</th>
                <th>prezzo unitario</th>
                <th>quantita</th>
                <th>Azioni</th>
                <th> Totale </th>
            </tr>
        </thead>
        <tbody id="carrello-list">
        </tbody>
    </table>
    <script>

        function tornaIndietro() {
            window.location.href = "Ecommerce.html";
        }

        function getCarrello() {
        fetch("http://localhost:8080/carrello")
        .then(response => response.json())
        .then(data => {
            const carrelloList = document.querySelector('#carrello-list');
            carrelloList.innerHTML = '';

            data.forEach(item => {
                carrelloList.innerHTML += `
                    <tr id="item-${item.articolo_id}">
                        <td>${item.articolo_id}</td>
                        <td>${item.nome}</td>
                        <td>${item.prezzo_unitario}€</td>
                        <td>
                           <div> <input class="quantity" type="number" id="quantity-${item.articolo_id}" value="${item.quantita}" min="1" disabled/> <button class="button-quantita" onclick="modificaQuantita(${item.articolo_id})">✏️</button></div>
                        </td>
                        <td>
                            <button id="button-delete" onclick="deleteArticolo(${item.articolo_id})">🗑️</button>
                            
                        </td>
                        <td>${item.prezzo_totale}</td>
                    </tr>
                `;
            });
        })
        .catch(error => console.error('Errore nel recupero carrello:', error));
}

   //Richiesta DELETE
   function deleteArticolo(id) {
            fetch(`http://localhost:8080/carrello/${id}`, { method: "DELETE" })
                .then(response => response.json())
                .then(data => {
                    document.getElementById(`item-${id}`).remove();
                })
                .catch(error => console.error("Errore nell'eliminazione dell'articolo:", error));
        }
        function modificaQuantita(id) {
        const tr = document.getElementById(`item-${id}`); // La riga corrispondente all'articolo
        const input = tr.querySelector(`#quantity-${id}`); // L'input specifico per la quantità
        const button = tr.querySelector('.button-quantita'); // Il bottone della matita/salva

            // Salva la quantità originale in una variabile di dataset
            if (!input.dataset.originalQuantity) {
                input.dataset.originalQuantity = input.value; // Memorizza la quantità iniziale
            }

            if (button.textContent === "✏️") {
                // abilito l'input e viene cambiato il bottone in "salva"
                input.disabled = false;
                button.textContent = "💾";
                button.style.backgroundColor = 'rgb(176, 50, 75)';
            } else {
            // disabilito l'input e viene inviata la richiesta al server
                const newQuantity = parseInt(input.value);

                if (newQuantity < 1) { //se abbasso la quantità a 0 invio un prompt così da far notare che se continuo, l'articolo verrà eliminato dal carrello
                    
                    const confirmDelete = confirm("Sei sicuro di voler procedere? L'articolo verrà eliminato.");
                    if (confirmDelete) {
                        deleteArticolo(id); // Elimina l'articolo
                    } else
                    {
                        // Ripristina la quantità originale
                        input.value = input.dataset.originalQuantity;
                    }
                    return;
                }

                // richiesta PUT al server
                fetch(`http://localhost:8080/carrello/${id}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ quantita: newQuantity })
                })
                .then(response => response.json())
                .then(data => {
                    // Modalità visualizzazione: disabilita l'input e cambia il bottone in "modifica"
                    input.disabled = true;
                    button.textContent = "✏️";
                    button.style.backgroundColor = 'rgb(38, 144, 131)';
                    // Aggiorno il carrello
                    getCarrello();
                })
                .catch(error => console.error("Errore nell'aggiornamento della quantità:", error));
            }
        }


    getCarrello(); // Chiama la funzione per ottenere gli articoli dal carrello

</script>
</body>
</html>
